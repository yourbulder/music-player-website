<script type="module">
  import { auth } from './js/firebase-config.js';
  import { 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { saveUserRole } from './js/auth.js';

  const status = document.getElementById('status');

  function showMessage(msg, isError = false) {
    status.textContent = msg;
    status.className = isError ? 'error' : 'success';
  }

  // Redirect if already logged in
  import('./js/auth.js').then(module => {
    module.initAuth((authState) => {
      if (authState.loggedIn) {
        window.location.href = 'dashboard.html';
      }
    });
  });

  window.showForm = (type) => {
    const loginBtn  = document.querySelector('.toggle-btn:nth-child(1)');
    const regBtn    = document.querySelector('.toggle-btn:nth-child(2)');
    const loginForm = document.getElementById('loginForm');
    const regForm   = document.getElementById('registerForm');

    if (type === 'login') {
      loginBtn.classList.add('active');
      regBtn.classList.remove('active');
      loginForm.classList.add('active');
      regForm.classList.remove('active');
    } else {
      regBtn.classList.add('active');
      loginBtn.classList.remove('active');
      regForm.classList.add('active');
      loginForm.classList.remove('active');
    }
  };

  window.handleLogin = async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      showMessage("Logging in...");
      // redirect handled by initAuth
    } catch (err) {
      showMessage(err.message || "Login failed", true);
    }
  };

  window.handleRegister = async (e) => {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPassword').value;
    const role  = document.querySelector('input[name="role"]:checked')?.value;

    if (!role) {
      showMessage("Please select Listener or Singer", true);
      return;
    }

    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, pass);
      await saveUserRole(userCred.user.uid, role);
      showMessage("Account created! Redirecting...", false);
      // redirect handled by initAuth
    } catch (err) {
      showMessage(err.message || "Registration failed", true);
    }
  };
</script>
