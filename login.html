<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music App - Login / Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h1>Music Player</h1>
  <p style="text-align:center; color:#8b949e;">Sign in or create account</p>

  <div class="toggle-btns">
    <button class="toggle-btn active" onclick="showForm('login')">Login</button>
    <button class="toggle-btn" onclick="showForm('register')">Register</button>
  </div>

  <div class="form-wrapper">
    <!-- Login Form -->
    <div class="form-box login active" id="loginForm">
      <form onsubmit="handleLogin(event)">
        <input type="email"    id="loginEmail"    placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>

    <!-- Register Form -->
    <div class="form-box register" id="registerForm">
      <form onsubmit="handleRegister(event)">
        <input type="email"    id="regEmail"    placeholder="Email" required />
        <input type="password" id="regPassword" placeholder="Password (min 6 chars)" required minlength="6" />
        <div style="margin: 15px 0; text-align:center;">
          <label style="margin-right:20px;">
            <input type="radio" name="role" value="listener" checked> Listener
          </label>
          <label>
            <input type="radio" name="role" value="singer"> Singer
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
    </div>
  </div>

  <p id="status"></p>

  <p style="text-align:center; margin-top:30px; color:#8b949e;">
    Made with <span class="lime-accent">♥</span> • Coming soon: Upload & Play
  </p>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { auth } from './js/firebase-config.js';
  import { 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const status = document.getElementById('status');

  function showMessage(msg, isError = false) {
    status.textContent = msg;
    status.className = isError ? 'error' : 'success';
  }

  window.showForm = (type) => {
    const loginBtn  = document.querySelector('.toggle-btn:nth-child(1)');
    const regBtn    = document.querySelector('.toggle-btn:nth-child(2)');
    const loginForm = document.getElementById('loginForm');
    const regForm   = document.getElementById('registerForm');

    if (type === 'login') {
      loginBtn.classList.add('active');
      regBtn.classList.remove('active');
      loginForm.classList.add('active');
      regForm.classList.remove('active');
    } else {
      regBtn.classList.add('active');
      loginBtn.classList.remove('active');
      regForm.classList.add('active');
      loginForm.classList.remove('active');
    }
  };

  window.handleLogin = async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged will redirect
    } catch (err) {
      showMessage(err.message || "Login failed", true);
    }
  };

  window.handleRegister = async (e) => {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPassword').value;
    const role  = document.querySelector('input[name="role"]:checked')?.value;

    if (!role) {
      showMessage("Please select a role", true);
      return;
    }

    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, pass);
      // We will save role to Firestore in next step
      showMessage("Account created! Redirecting...");
    } catch (err) {
      showMessage(err.message || "Registration failed", true);
    }
  };

  // Listen for auth change → redirect if logged in
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = 'dashboard.html';
    }
  });
</script>

</body>
</html>
